<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>人生感 · Life Reflections</title>
  <style>
    body {
      margin: 0;
      font-family: "Noto Serif SC", serif;
      background: linear-gradient(#0f1f1c, #091311);
      color: #f5f3e7;
    }

    header {
      text-align: center;
      padding: 60px 20px 30px;
    }

    h1 {
      font-size: 36px;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #cfc8a3;
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.8;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }

    .card-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(240,230,200,0.12);
      border-radius: 16px;
      overflow: hidden;
      transition: 0.3s;
      backdrop-filter: blur(6px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.22);
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(232,219,160,0.35);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 16px;
    }

    .card-title {
      font-size: 18px;
      margin-bottom: 8px;
      color: #f0e6c8;
    }

    .card-desc {
      font-size: 13px;
      color: #cfc8a3;
      line-height: 1.7;
    }

    .read {
      margin-top: 12px;
      display: inline-block;
      font-size: 12px;
      color: #e8dba0;
    }

    footer {
      text-align: center;
      padding: 40px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

<header>
  <h1>人生感 · Life Reflections</h1>
  <div class="subtitle">
    不教你什么，只陪你慢下来。🍃🪞 <br>
    Not to teach, but to help you slow down.
  </div>
</header>

<div class="container">
  <div class="grid">

    <a class="card-link" href="life-scroll.html?id=L001">
      <div class="card">
        <img src="images/wind-bloom.jpg" alt="风与花">
        <div class="card-content">
          <div class="card-title">L001 · 风与花</div>
          <div class="card-desc">
            放慢脚步，看见世界的温柔。
          </div>
          <div class="read">Read Scroll →</div>
        </div>
      </div>
    </a>

    <a class="card-link" href="life-scroll.html?id=L002">
      <div class="card">
        <img src="images/tea.jpg" alt="一壶见心">
        <div class="card-content">
          <div class="card-title">L002 · 一壶见心</div>
          <div class="card-desc">
            一冲一泡之间，把自己找回来。
          </div>
          <div class="read">Read Scroll →</div>
        </div>
      </div>
    </a>

    <a class="card-link" href="life-scroll.html?id=L003">
      <div class="card">
        <img src="images/no-strive.jpg" alt="不争之安">
        <div class="card-content">
          <div class="card-title">L003 · 不争之安</div>
          <div class="card-desc">
            不争，不是放弃，是不再消耗自己。
          </div>
          <div class="read">Read Scroll →</div>
        </div>
      </div>
    </a>

    <a class="card-link" href="life-scroll.html?id=L004">
      <div class="card">
        <img src="images/life-shape.jpg" alt="生命的样子">
        <div class="card-content">
          <div class="card-title">L004 · 生命的样子</div>
          <div class="card-desc">
            看世界，爱自己。
          </div>
          <div class="read">Read Scroll →</div>
        </div>
      </div>
    </a>

  </div>
</div>

<footer>
  一步一叶，一语一光 🍃🪞
</footer>

</body>
</html>
